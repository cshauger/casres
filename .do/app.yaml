name: casres
region: sfo

services:
  - name: web
    github:
      repo: cshauger/casres
      branch: digitalocean-app-platform
      deploy_on_push: true
    
    source_dir: /
    
    envs:
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: AIRTABLE_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: CASRES_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
    
    http_port: 8080
    
    instance_count: 1
    instance_size_slug: basic-xxs
    
    routes:
      - path: /
    
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

# Background worker for automated check-ins
workers:
  - name: checkin-scheduler
    github:
      repo: cshauger/casres
      branch: digitalocean-app-platform
      deploy_on_push: true
    
    source_dir: /
    
    envs:
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: CASRES_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
    
    run_command: node worker.js
    
    instance_count: 1
    instance_size_slug: basic-xxs
